<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANO CLOUD | 2026 ENGINE</title>

<body>

    <nav>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

                <svg class="logo-vector" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>

        <header style="text-align: center; margin: 40px 0;">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">منصة الاستضافة المتطورة</h1>
            <p style="color: var(--text-dim);">أنشئ هوست خاص بك، وتحكم في بيئتك البرمجية بالكامل.</p>
        </header>

        <div class="dashboard-grid" id="hostsGrid">
            </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="script.js"></script>
